---
id: https://w3id.org/lmodel/nist-sp-800-171
name: NIST-SP-800-171
description: >-
  Electronic (LinkML) Version of Protecting Controlled Unclassified Information in Nonfederal Systems and Organizations
version: 3.0.0
source: https://doi.org/10.6028/NIST.SP.800-171r3

default_prefix: nist_sp_800_171
default_range: string

prefixes:
  linkml: https://w3id.org/linkml/
  nist_sp_800_171: https://w3id.org/lmodel/nist-sp-800-171/

imports:
  - linkml:types

subsets:
  nist_sp_800_171r3_catalog:
    description: >-
      NIST SP 800-171 Catalog subset for requirements and assessment procedures

slots:
  catalog:
    description: Root catalog payload
    range: CatalogBody
    inlined: true
    in_subset:
      - nist_sp_800_171r3_catalog

  metadata:
    description: Catalog metadata
    range: Metadata
    inlined: true
    in_subset:
      - nist_sp_800_171r3_catalog

  groups:
    description: List of requirement family groups in the catalog
    range: ControlGroup
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  controls:
    description: List of security requirements in a family group
    range: Control
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  params:
    description: List of organization-defined parameters for a requirement
    range: Parameter
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  props:
    description: List of properties
    range: Property
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  guidelines:
    description: List of guidelines for a parameter
    range: Guideline
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  links:
    description: List of links and relationships
    range: Link
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  parts:
    description: Nested parts providing prose, statements, guidance, assessment objectives and methods
    range: Part
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  id:
    description: Unique identifier for an element
    in_subset:
      - nist_sp_800_171r3_catalog

  uuid:
    description: UUID for catalog, metadata, or resource element
    in_subset:
      - nist_sp_800_171r3_catalog

  title:
    description: Human-readable title
    in_subset:
      - nist_sp_800_171r3_catalog

  published:
    description: Publication timestamp
    in_subset:
      - nist_sp_800_171r3_catalog

  version:
    description: Version identifier
    in_subset:
      - nist_sp_800_171r3_catalog

  "last-modified":
    description: Last modification timestamp
    aliases:
      - last_modified
    in_subset:
      - nist_sp_800_171r3_catalog

  "oscal-version":
    description: OSCAL version identifier
    aliases:
      - oscal_version
    in_subset:
      - nist_sp_800_171r3_catalog

  _class:
    description: Classification of a catalog element (e.g. family, requirement, security_requirement)
    in_subset:
      - nist_sp_800_171r3_catalog

  label:
    description: Human-readable label
    in_subset:
      - nist_sp_800_171r3_catalog

  name:
    description: Name of a property, part, or party
    in_subset:
      - nist_sp_800_171r3_catalog

  value:
    description: Property value
    in_subset:
      - nist_sp_800_171r3_catalog

  ns:
    description: Namespace URI for a property
    in_subset:
      - nist_sp_800_171r3_catalog

  prose:
    description: Free-text prose content
    in_subset:
      - nist_sp_800_171r3_catalog

  usage:
    description: Human-readable description of an organization-defined parameter's expected value
    in_subset:
      - nist_sp_800_171r3_catalog

  remarks:
    description: Supplemental remarks
    in_subset:
      - nist_sp_800_171r3_catalog

  roles:
    description: Roles used in metadata
    range: Role
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  parties:
    description: Parties used in metadata
    range: Party
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  "responsible-parties":
    description: Responsible party assignments
    aliases:
      - responsible_parties
    range: ResponsibleParty
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  "role-id":
    description: Assigned role identifier
    aliases:
      - role_id
    in_subset:
      - nist_sp_800_171r3_catalog

  "party-uuids":
    description: Referenced party UUIDs
    aliases:
      - party_uuids
    multivalued: true
    in_subset:
      - nist_sp_800_171r3_catalog

  type:
    description: Party type
    in_subset:
      - nist_sp_800_171r3_catalog

  "short-name":
    description: Short display name
    aliases:
      - short_name
    in_subset:
      - nist_sp_800_171r3_catalog

  "email-addresses":
    description: Party email addresses
    aliases:
      - email_addresses
    multivalued: true
    in_subset:
      - nist_sp_800_171r3_catalog

  addresses:
    description: Postal addresses
    range: Address
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  "addr-lines":
    description: Address lines
    aliases:
      - addr_lines
    multivalued: true
    in_subset:
      - nist_sp_800_171r3_catalog

  city:
    description: City name
    in_subset:
      - nist_sp_800_171r3_catalog

  state:
    description: State or region
    in_subset:
      - nist_sp_800_171r3_catalog

  "postal-code":
    description: Postal code
    aliases:
      - postal_code
    in_subset:
      - nist_sp_800_171r3_catalog

  "back-matter":
    description: Back-matter references and resources
    aliases:
      - back_matter
    range: BackMatter
    inlined: true
    in_subset:
      - nist_sp_800_171r3_catalog

  resources:
    description: Back-matter resources
    range: Resource
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  citation:
    description: Citation details for a resource
    range: Citation
    inlined: true
    in_subset:
      - nist_sp_800_171r3_catalog

  text:
    description: Citation text
    in_subset:
      - nist_sp_800_171r3_catalog

  description:
    description: Resource description
    in_subset:
      - nist_sp_800_171r3_catalog

  rlinks:
    description: Resource links
    range: ResourceLink
    multivalued: true
    inlined: true
    inlined_as_list: true
    in_subset:
      - nist_sp_800_171r3_catalog

  "media-type":
    description: Media type for a resource link
    aliases:
      - media_type
    in_subset:
      - nist_sp_800_171r3_catalog

  href:
    description: Link or resource reference
    in_subset:
      - nist_sp_800_171r3_catalog

  rel:
    description: Relationship type for a link
    in_subset:
      - nist_sp_800_171r3_catalog

enums:
  CatalogElementClassValue:
    description: Allowed values for group and control class attributes
    permissible_values:
      family:
      requirement:
    in_subset:
      - nist_sp_800_171r3_catalog

  PartClassValue:
    description: Allowed values for part class attributes
    permissible_values:
      security_requirement:
    in_subset:
      - nist_sp_800_171r3_catalog

  AssessmentMethodValue:
    description: Allowed values for assessment method property values
    permissible_values:
      EXAMINE:
      INTERVIEW:
      TEST:
    in_subset:
      - nist_sp_800_171r3_catalog

classes:
  SP800171Document:
    description: Root wrapper for SP 800-171 catalog content
    tree_root: true
    class_uri: linkml:Any
    slots:
      - catalog
    in_subset:
      - nist_sp_800_171r3_catalog

  CatalogBody:
    description: Main catalog object
    class_uri: linkml:Any
    slots:
      - uuid
      - metadata
      - groups
      - "back-matter"
    in_subset:
      - nist_sp_800_171r3_catalog

  Metadata:
    description: OSCAL metadata section
    class_uri: linkml:Any
    slots:
      - title
      - published
      - "last-modified"
      - version
      - "oscal-version"
      - props
      - links
      - roles
      - parties
      - "responsible-parties"
    in_subset:
      - nist_sp_800_171r3_catalog

  Role:
    description: Role definition
    slots:
      - id
      - title
    in_subset:
      - nist_sp_800_171r3_catalog

  Party:
    description: Party definition
    class_uri: linkml:Any
    slots:
      - uuid
      - type
      - name
      - "short-name"
      - "email-addresses"
      - addresses
    in_subset:
      - nist_sp_800_171r3_catalog

  Address:
    description: Postal address
    class_uri: linkml:Any
    slots:
      - "addr-lines"
      - city
      - state
      - "postal-code"
    in_subset:
      - nist_sp_800_171r3_catalog

  ResponsibleParty:
    description: Assignment of parties to a role
    class_uri: linkml:Any
    slots:
      - "role-id"
      - "party-uuids"
    in_subset:
      - nist_sp_800_171r3_catalog

  BackMatter:
    description: OSCAL back-matter section
    class_uri: linkml:Any
    slots:
      - resources
    in_subset:
      - nist_sp_800_171r3_catalog

  Resource:
    description: Referenced resource
    class_uri: linkml:Any
    slots:
      - uuid
      - title
      - description
      - citation
      - rlinks
    in_subset:
      - nist_sp_800_171r3_catalog

  Citation:
    description: Citation wrapper
    class_uri: linkml:Any
    slots:
      - text
    in_subset:
      - nist_sp_800_171r3_catalog

  ResourceLink:
    description: Reference link for a resource
    class_uri: linkml:Any
    slots:
      - href
      - "media-type"
    in_subset:
      - nist_sp_800_171r3_catalog

  CatalogElement:
    description: Base class for catalog elements with id, props, links, and parts
    abstract: true
    slots:
      - id
      - props
      - links
      - parts
    in_subset:
      - nist_sp_800_171r3_catalog

  IdentifiedElement:
    description: A catalog element with required id, title, and optional class/label
    is_a: CatalogElement
    slots:
      - title
      - _class
      - label
    slot_usage:
      _class:
        range: CatalogElementClassValue
    in_subset:
      - nist_sp_800_171r3_catalog

  ControlGroup:
    description: A family group of security requirements
    is_a: IdentifiedElement
    slots:
      - controls
    in_subset:
      - nist_sp_800_171r3_catalog

  Control:
    description: A security requirement
    is_a: IdentifiedElement
    slots:
      - params
    in_subset:
      - nist_sp_800_171r3_catalog

  Parameter:
    description: An organization-defined parameter for a security requirement
    is_a: IdentifiedElement
    slots:
      - usage
      - guidelines
    in_subset:
      - nist_sp_800_171r3_catalog

  Guideline:
    description: Additional prose guidance associated with a parameter
    slots:
      - prose
    in_subset:
      - nist_sp_800_171r3_catalog

  Property:
    description: A name-value property with optional namespace
    slots:
      - name
      - value
      - ns
      - _class
    in_subset:
      - nist_sp_800_171r3_catalog

  Link:
    description: Relationship link
    slots:
      - href
      - rel
    in_subset:
      - nist_sp_800_171r3_catalog

  Part:
    description: >-
      Structured narrative part containing prose and optional nested parts.
      Used for statements, guidance, assessment-objectives, and assessment-methods.
    is_a: CatalogElement
    slots:
      - name
      - _class
      - prose
    slot_usage:
      _class:
        range: PartClassValue
    in_subset:
      - nist_sp_800_171r3_catalog
